<!DOCTYPE html>
<html>
<head>
<title>ISmart Guidebook</title>
<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
margin:0;
}

header{
background:#4f7cff;
color:white;
padding:30px;
font-size:28px;
}

.container{
display:flex;
justify-content:center;
gap:25px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:12px;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

h3{
margin-top:0;
}

</style>
</head>

<body>

<header>
ISmart DakLak Guidebook
</header>

<div class="container">

<div class="card">
<h3>Thanh toán</h3>
<p>Quy trình thanh toán NCC</p>
</div>

<div class="card">
<h3>Hợp đồng</h3>
<p>Các hợp đồng mẫu</p>
</div>

<div class="card">
<h3>Timeline</h3>
<p>Nhiệm vụ học kỳ</p>
</div>

<div class="card">
<h3>Tồn kho</h3>
<p>Quản lý vật dụng</p>
</div>

</div>

</body>
</html>
